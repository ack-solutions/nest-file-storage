name: Release

# Merge-driven release. To publish a new version:
#   1. In a PR, bump `packages/nest-file-storage/package.json` "version" (and update CHANGELOG.md).
#   2. Merge the PR into `main`.
# On merge, this workflow publishes that version to npm (if not already published) and
# creates the matching git tag + GitHub Release. If the version is unchanged, it is a no-op.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create tags and GitHub Releases
  id-token: write # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine version
        id: pkg
        shell: bash
        run: |
          VERSION="$(node -p "require('./packages/nest-file-storage/package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Prerelease (e.g. 2.0.0-beta.1) -> dist-tag "beta"/"rc"/...; stable -> "latest".
          if [[ "$VERSION" == *"-"* ]]; then
            PRE="${VERSION#*-}"
            echo "dist_tag=${PRE%%.*}" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to release
        id: check
        shell: bash
        run: |
          # Opt-out: a [skip release] / [no release] / [skip ci] marker in the head commit message
          # skips publishing on a push (e.g. when you bump the version but aren't ready to ship).
          # Manual runs (the "Run workflow" button) ignore the marker and always attempt a release.
          if [ "${{ github.event_name }}" = "push" ]; then
            MSG="$(git log -1 --pretty=%B)"
            if printf '%s' "$MSG" | grep -qiE '\[(skip release|release skip|no release|skip ci)\]'; then
              echo "release=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Skip marker found in the commit message — skipping release."
              exit 0
            fi
          fi

          PUBLISHED="$(npm view "@ackplus/nest-file-storage@${{ steps.pkg.outputs.version }}" version 2>/dev/null || true)"
          if [ -n "$PUBLISHED" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${{ steps.pkg.outputs.version }} is already on npm — nothing to release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing version ${{ steps.pkg.outputs.version }}."
          fi

      - name: Setup pnpm
        if: steps.check.outputs.release == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node
        if: steps.check.outputs.release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        if: steps.check.outputs.release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.release == 'true'
        run: pnpm -C packages/nest-file-storage build

      - name: Test
        if: steps.check.outputs.release == 'true'
        run: pnpm -C packages/nest-file-storage test

      - name: Publish to npm
        if: steps.check.outputs.release == 'true'
        run: |
          pnpm -r publish \
            --access public \
            --no-git-checks \
            --provenance \
            --tag "${{ steps.pkg.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag and GitHub Release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes
